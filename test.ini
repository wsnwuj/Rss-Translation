
# ==================================================
# 🧠 2026 ULTIMATE HEALTH INTELLIGENCE SYSTEM
# V1 RSS + V2 Evidence + V3 Simulation + V4 Optimization
# ==================================================

[cfg]
version = "2026_Ultimate_V1_to_V4_Integrated"
mode = "multi_layer_health_ai"
base = "rss/"
dedup = true
md5_mode = "auto"

# ==================================================
# 🟦 V1 信息层：RSS数据源（信息输入）
# ==================================================

[source001]
name = "Examine"
url = "https://examine.com/feed/"
max = "20"

[source002]
name = "Harvard Health"
url = "https://www.health.harvard.edu/blog/feed"
max = "15"

[source003]
name = "NIH News"
url = "https://www.nih.gov/news-events/news-releases/rss.xml"
max = "15"

[source004]
name = "Nature Nutrition"
url = "https://www.nature.com/subjects/nutrition.rss"
max = "10"

[source005]
name = "Science Daily Health"
url = "https://www.sciencedaily.com/rss/health_medicine.xml"
max = "20"

[source006]
name = "Medical Xpress"
url = "https://medicalxpress.com/rss-feed/search.php?query=nutrition"
max = "20"

[source010]
name = "WHO News"
url = "https://www.who.int/feeds/entity/mediacentre/news/en/rss.xml"
max = "10"

[source011]
name = "CDC Updates"
url = "https://tools.cdc.gov/api/v2/resources/media/403372.rss"
max = "10"

[source012]
name = "FDA Updates"
url = "https://www.fda.gov/about-fda/contact-fda/stay-informed/rss-feeds"
max = "10"

[source013]
name = "Longevity Technology"
url = "https://www.longevity.technology/feed/"
max = "15"

[source014]
name = "Fight Aging"
url = "https://www.fightaging.org/feed/"
max = "15"


# ==================================================
# 🟨 V2 证据层：PubMed科学证据
# ==================================================

[pubmed_cfg]
retmax = 25
sort = "date"
datetype = "pdat"
mindate = "2020"

[query001]
name = "DFI oxidative stress sperm"
query = "(DNA fragmentation index OR sperm DNA fragmentation) AND oxidative stress"

[query002]
name = "male fertility antioxidants NAC CoQ10"
query = "(male infertility) AND (NAC OR CoQ10 OR L-carnitine)"

[query003]
name = "mitochondria aging NAD"
query = "(mitochondria dysfunction) AND (NAD+ OR aging)"

[query004]
name = "omega-3 inflammation clinical trial"
query = "omega-3 AND inflammation AND clinical trial"

[query005]
name = "atrophic gastritis intestinal metaplasia"
query = "atrophic gastritis AND intestinal metaplasia"


# ==================================================
# 🟧 V2过滤层：信息质量控制
# ==================================================

[filter]

dedup = true
dedup_window_days = 7

priority_sources = [
  "Examine",
  "PubMed",
  "Nature",
  "Science",
  "NIH",
  "WHO",
  "FDA",
  "Harvard Health"
]

block_keywords = [
  "miracle",
  "detox cure",
  "fat burning hack",
  "weight loss secret",
  "instant cure"
]

boost_keywords = [
  "randomized",
  "meta-analysis",
  "systematic review",
  "clinical trial",
  "human study"
]

focus_tags = [
  "oxidative stress",
  "DNA fragmentation",
  "male fertility",
  "mitochondria",
  "longevity"
]


# ==================================================
# 🟥 V3 生理模拟层（动态时间模型）
# ==================================================

[v3_simulation]

time_horizon_days = 90

baseline = {
  DFI = 28,
  motility = 42,
  oxidative_stress = 0.72,
  mitochondria = 0.60,
  inflammation = 0.55
}

decay_model = {
  NAC_half_life = 3,
  CoQ10_half_life = 14,
  Carnitine_half_life = 10
}

response_links = {
  DFI_inverse = true,
  motility_lag_days = 14
}


# ==================================================
# 🟩 V4 剂量优化层（核心AI医生模块）
# ==================================================

[v4_core]

mode = "dose_optimization"
engine = "bayesian_pareto"

# --------------------------
# 🧬 个体基线（关键）
# --------------------------

baseline = {
  DFI = 28,
  motility = 42,
  oxidative_stress = 0.72,
  mitochondrial_function = 0.60,
  gastric_sensitivity = 0.80,
  absorption_factor = 0.78
}

response_sensitivity = {
  NAC = 0.95,
  CoQ10 = 0.75,
  L_carnitine = 0.85,
  Omega_3 = 0.65,
  Zinc = 0.70
}

# --------------------------
# 🧪 剂量空间
# --------------------------

dose_space = {
  NAC = "0-1800",
  CoQ10 = "0-400",
  L_carnitine = "0-3000",
  Omega_3 = "0-3000",
  Zinc = "0-40",
  Vitamin_C = "0-1000"
}

# --------------------------
# ⚖️ 多目标优化
# --------------------------

objective_weights = {
  DFI_reduction = 0.45,
  motility_improvement = 0.30,
  oxidative_stress_reduction = 0.25
}

# --------------------------
# 📊 剂量-响应曲线
# --------------------------

dose_response = {
  NAC = {type="logistic", inflection=900, plateau=1400},
  CoQ10 = {type="sigmoid", inflection=200, plateau=300},
  L_carnitine = {type="saturating_linear", inflection=1500},
  Zinc = {type="bell_curve", optimal=[15,25]},
  Omega_3 = {type="diminishing_returns", inflection=1500}
}

# --------------------------
# ⚠️ 风险模型
# --------------------------

risk_model = {
  max_stack = 6,
  vitamin_c_limit = 500,
  zinc_limit = 25,
  gastric_penalty = true,
  interaction_matrix = true
}

# --------------------------
# 🧠 优化器
# --------------------------

optimizer = {
  algorithm = "bayesian_optimization",
  iterations = 500,
  exploration_ratio = 0.25,
  pareto_front = true,
  convergence_threshold = 0.02
}

# --------------------------
# 📊 输出控制
# --------------------------

output = {
  show_optimal_dose = true,
  show_safe_range = true,
  show_risk_curve = true,
  show_90day_projection = true,
  format = "clinical_report"
}
